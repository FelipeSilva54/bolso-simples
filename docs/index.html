<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bolso Simples — Documentos Legais</title>
  <meta name="description" content="Política de Privacidade e Termos de Uso do aplicativo Bolso Simples." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #F6F6F6;
      color: #080808;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    }

    .logo-box {
      width: 72px;
      height: 72px;
      background: #E6F4FE;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #080808;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 15px;
      color: #5D5D5D;
      margin-top: 8px;
      line-height: 1.5;
    }

    .divider {
      height: 1px;
      background: #DBDBDB;
      margin: 32px 0;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: block;
      padding: 16px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      transition: opacity 0.15s;
      border: 1.5px solid #DBDBDB;
      color: #080808;
      background: #fff;
      text-align: left;
    }

    .link-btn:hover { opacity: 0.7; }

    .link-btn .icon { margin-right: 10px; }
    .link-btn .arrow { float: right; color: #8C8C8C; }

    .footer {
      margin-top: 32px;
      font-size: 13px;
      color: #8C8C8C;
      line-height: 1.6;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-box">💰</div>
    <h1>Bolso Simples</h1>
    <p class="subtitle">100% brasileiro · Gratuito · Sem anúncios</p>

    <div class="divider"></div>

    <div class="links">
      <a class="link-btn" href="./privacidade/">
        <span class="icon">🔒</span>Política de Privacidade
        <span class="arrow">›</span>
      </a>
      <a class="link-btn" href="./termos/">
        <span class="icon">📄</span>Termos de Uso
        <span class="arrow">›</span>
      </a>
    </div>

    <div class="footer">
      <p>Bolso Simples · Versão 1.0</p>
      <p style="margin-top:4px;">contato: <a href="mailto:bolsosimples@gmail.com" style="color:#5D5D5D;">bolsosimples@gmail.com</a></p>
    </div>
  </div>
</body>
</html>
